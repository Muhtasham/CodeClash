# Model roster for generate_confs.py. Each entry is a mini-SWE-agent model config and is
# embedded verbatim as the per-player `model` block in generated tournament configs.
#
# Models are resolved by litellm using their provider-prefixed names, so set the matching
# provider API key in the environment (ANTHROPIC_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY,
# XAI_API_KEY, DASHSCOPE_API_KEY). See .env.example.

- model_name: anthropic/claude-sonnet-4-20250514
  model_kwargs:
    temperature: 0.2
    max_tokens: 4096
- model_name: anthropic/claude-sonnet-4-5-20250929
  model_kwargs:
    temperature: 0.2
    max_tokens: 4096
- model_name: xai/grok-code-fast-1
  model_kwargs:
    temperature: 0.2
- model_name: gemini/gemini-2.5-pro
  model_kwargs:
    temperature: 0.2
- model_name: openai/gpt-5
- model_name: openai/gpt-5-mini
- model_name: dashscope/qwen3-coder-plus-2025-09-23
  model_kwargs:
    temperature: 0.2
- model_name: openai/o3
